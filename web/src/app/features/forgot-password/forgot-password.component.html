<div class="auth-page">
  <section class="auth-card">
    <div class="brand">
      <img src="images/atico-logo.jpg" alt="El Ático">
      <span>El Ático</span>
      <h1>Recuperar contraseña</h1>
      <p>Te enviaremos un enlace al correo registrado</p>
    </div>

    @if(message()){
      <div class="auth-message success">
        {{ message() }}
      </div>
    }

    @if(errorMessage()){
      <div class="auth-message error">
        {{ errorMessage() }}
      </div>
    }

    <form [formGroup]="form" (ngSubmit)="submit()">
      <label>
        Usuario o correo
        <input type="text" formControlName="identifier">
      </label>

      <button type="submit" [disabled]="loading()">
        {{ loading() ? 'Enviando...' : 'Enviar enlace' }}
      </button>

      <a routerLink="/login">Volver a iniciar sesión</a>
    </form>
  </section>
</div>
